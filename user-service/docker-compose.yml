version: '3.8'
services:
  user-service-db:
    container_name: user_service_db
    image: postgres:17
    ports:
      - 5437:5432
    environment:
      POSTGRES_USER: userserviceadmin
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: pl_user_service

  keycloak:
    container_name: keycloak
    image: quay.io/keycloak/keycloak:24.0.1
    command: start-dev
    ports:
      - "8180:8080"     # 8180 on host so it doesn't clash with user-service on 8081
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    networks:
      - user-net

networks:
  user-net:
    driver: bridge